id: repo.safe-code-review
name:
  en: Safe Code Review
  zh-CN: 安全代码审查
category: engineering
visibility: public
version: 0.2.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Review a code change or PR broadly for correctness, compatibility, security, maintainability, and tests. Use security-focused-review, performance-regression-analysis, or api-contract-review when the user requests one bounded specialist assessment; do not implement fixes.
  zh-CN: 广泛审查代码改动或 PR 的正确性、兼容性、安全性、可维护性和测试。用户要求单一安全、性能回归或 API 契约专项时分别使用对应专项 Skill；本 Skill 不实施修复。
triggers:
  en:
    - review this code
    - check this diff
    - safe code review
  zh-CN:
    - 审查代码
    - 检查当前 diff
    - 安全代码审查
    - 帮我 review 一下
tool_requirements:
  filesystem: read
  git: optional
  shell: optional
  web: none
permissions:
  read_files: true
  write_files: false
  run_shell_commands: false
  access_network: false
  destructive_actions_allowed: false
risk_level:
  default: read_only
output_schema:
  type: review_report
localization:
  en:
    status: complete
  zh-CN:
    status: complete
