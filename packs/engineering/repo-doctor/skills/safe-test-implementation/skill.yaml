id: repo.safe-test-implementation
name:
  en: Safe Test Implementation
  zh-CN: 安全补充测试
category: engineering
visibility: public
version: 0.2.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Add the smallest set of high-value tests from a test-gap analysis, confirmed behavior, or verified fix, following the repository's real framework and conventions. Use to edit tests, fixtures, and necessary test helpers only; do not use for general bug fixes, production refactors, or coverage-only assertions, and stop before production-code changes unless the user explicitly expands scope.
  zh-CN: 根据测试缺口分析、已确认行为或已验证修复，遵循仓库真实框架和约定最小化补充高价值测试。用于修改测试、fixture 和必要测试辅助代码；不用于通用 Bug 修复、生产代码重构或只为覆盖率添加断言，必须改生产代码时除非用户明确扩大范围否则停止。
triggers:
  en:
    - implement the missing regression test
    - add the highest-value tests from this gap analysis
    - safely add tests for this confirmed behavior
    - safe test implementation
  zh-CN:
    - 实施缺失的回归测试
    - 根据缺口分析补充高价值测试
    - 为已确认行为安全补测试
    - 安全补充测试
tool_requirements:
  filesystem: write
  git: optional
  shell: optional
  web: none
permissions:
  read_files: true
  write_files: true
  run_shell_commands: true
  access_network: false
  destructive_actions_allowed: false
risk_level:
  default: safe_edit
output_schema:
  type: test_implementation_report
localization:
  en:
    status: complete
  zh-CN:
    status: complete
