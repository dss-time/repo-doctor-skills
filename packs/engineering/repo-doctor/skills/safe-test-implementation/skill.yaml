id: repo.safe-test-implementation
name:
  en: Safe Test Implementation
  zh-CN: 安全补充测试
category: engineering
visibility: public
version: 0.3.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Add the smallest high-value tests in one explicit mode: test_first before behavior exists, regression_after_fix after a verified fix, or characterization for legacy behavior. Use for authorized test, fixture, and necessary test-helper edits only; do not fabricate a red state, modify production code, perform a general bug fix, or add coverage-only assertions.
  zh-CN: 以一种明确模式最小化补充高价值测试：行为实现前的 test_first、已验证修复后的 regression_after_fix，或旧行为的 characterization。仅用于已授权的测试、fixture 和必要测试辅助代码修改；不得伪造红灯、修改生产代码、执行通用 Bug 修复或只为覆盖率补断言。
triggers:
  en:
    - implement this test first before the behavior
    - add a regression test after this verified fix
    - characterize this legacy behavior with tests
    - safe test implementation
  zh-CN:
    - 在实现行为前测试先行
    - 为这个已验证修复补回归测试
    - 用测试刻画这段旧行为
    - 安全补充测试
tool_requirements:
  filesystem: write
  git: optional
  shell: optional
  web: none
permissions:
  read_files: true
  write_files: true
  run_shell_commands: true
  access_network: false
  destructive_actions_allowed: false
risk_level:
  default: safe_edit
output_schema:
  type: test_implementation_report
localization:
  en:
    status: complete
  zh-CN:
    status: complete
