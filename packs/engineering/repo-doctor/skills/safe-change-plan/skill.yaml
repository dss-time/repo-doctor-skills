id: repo.safe-change-plan
name:
  en: Safe Change Plan
  zh-CN: 安全变更计划
category: engineering
visibility: public
version: 0.1.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Turn a confirmed specification, root-cause finding, or impact analysis into an atomic, verifiable, reversible implementation plan with explicit scope and risk controls. Use only when material decisions are closed and blast radius is sufficiently known; route open decisions to requirements-clarification, settled requirements needing a specification to requirements-to-spec, unknown impact to change-impact-analysis, architecture rationale or decision documentation to architecture-decision-record, and execution to safe-fix-implementation.
  zh-CN: 将已确认规格、根因结论或影响分析转为原子化、可验证、可回滚且范围明确的实施计划。仅在重大决策已闭合且影响范围足够明确时使用；未决需求交给 requirements-clarification，已闭合但尚需规格化的需求交给 requirements-to-spec，影响未知交给 change-impact-analysis，架构理由或决策文档交给 architecture-decision-record，执行交给 safe-fix-implementation。
triggers:
  en:
    - create a safe implementation plan
    - plan this confirmed change
    - make an atomic rollback-ready change plan
    - safe change plan
  zh-CN:
    - 制定安全实施计划
    - 为这个已确认变更拆解步骤
    - 生成可回滚的原子变更计划
    - 安全变更计划
tool_requirements:
  filesystem: read
  git: optional
  shell: optional
  web: none
permissions:
  read_files: true
  write_files: false
  run_shell_commands: false
  access_network: false
  destructive_actions_allowed: false
risk_level:
  default: advisory
output_schema:
  type: safe_change_plan
localization:
  en:
    status: complete
  zh-CN:
    status: complete
