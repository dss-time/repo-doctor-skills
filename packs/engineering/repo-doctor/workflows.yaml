version: 1
registry_id: repo-doctor.workflows
supported_platforms: [codex, claude-code, cursor, qwen, kimi, generic, chatgpt-skill]
workflows:
  feature-delivery:
    title:
      en: Feature delivery
      zh-CN: 功能交付
    entry_conditions: [repository_feature_request]
    entry_stage: route
    supported_platforms: [codex, claude-code, cursor, qwen, kimi, generic, chatgpt-skill]
    stages:
      -
        id: route
        type: skill
        skill: repo-doctor-router
        optional: false
        condition: always
        prerequisites: []
        next: [clarification]
        alternatives: []
        permission: read_only
        approval_gate: none
        stop_conditions: [no_verified_skill]
      -
        id: clarification
        type: skill
        skill: requirements-clarification
        optional: true
        condition: material_decisions_open
        prerequisites: [route]
        next: [specification]
        alternatives: []
        permission: read_only
        approval_gate: none
        stop_conditions: [material_decision_unresolved]
      -
        id: specification
        type: skill
        skill: requirements-to-spec
        optional: false
        condition: material_decisions_closed
        prerequisites: [clarification]
        next: [work-items]
        alternatives: []
        permission: read_only
        approval_gate: none
        stop_conditions: [material_decision_reopened]
      -
        id: work-items
        type: skill
        skill: spec-to-work-items
        optional: true
        condition: multi_step_delivery
        prerequisites: [specification]
        next: [impact]
        alternatives: [safe-change-plan]
        permission: read_only
        approval_gate: none
        stop_conditions: [specification_missing]
      -
        id: impact
        type: skill
        skill: change-impact-analysis
        optional: false
        condition: change_target_known
        prerequisites: [work-items]
        next: [plan]
        alternatives: []
        permission: read_only
        approval_gate: none
        stop_conditions: [impact_unknown]
      -
        id: plan
        type: skill
        skill: safe-change-plan
        optional: false
        condition: impact_known
        prerequisites: [impact]
        next: [implementation-approval]
        alternatives: []
        permission: read_only
        approval_gate: none
        stop_conditions: [plan_input_incomplete]
      -
        id: implementation-approval
        type: gate
        skill: none
        optional: false
        condition: write_requested
        prerequisites: [plan]
        next: [implementation]
        alternatives: []
        permission: none
        approval_gate: explicit_write_authorization
        stop_conditions: [write_not_authorized]
      -
        id: implementation
        type: skill
        skill: safe-fix-implementation
        optional: false
        condition: write_authorized
        prerequisites: [implementation-approval]
        next: [review]
        alternatives: []
        permission: write_scoped
        approval_gate: implementation-approval
        stop_conditions: [scope_expansion_required]
      -
        id: review
        type: skill
        skill: safe-code-review
        optional: false
        condition: implementation_available
        prerequisites: [implementation]
        next: [test-gap]
        alternatives: []
        permission: read_only
        approval_gate: none
        stop_conditions: [blocking_review_finding]
      -
        id: test-gap
        type: skill
        skill: test-gap-analysis
        optional: false
        condition: reviewed_change
        prerequisites: [review]
        next: [test-approval]
        alternatives: []
        permission: read_only
        approval_gate: none
        stop_conditions: [test_boundary_unknown]
      -
        id: test-approval
        type: gate
        skill: none
        optional: true
        condition: test_changes_required
        prerequisites: [test-gap]
        next: [test-implementation]
        alternatives: [release-readiness-check]
        permission: none
        approval_gate: explicit_write_authorization
        stop_conditions: [test_write_not_authorized]
      -
        id: test-implementation
        type: skill
        skill: safe-test-implementation
        optional: true
        condition: test_changes_authorized
        prerequisites: [test-approval]
        next: [release]
        alternatives: []
        permission: write_scoped
        approval_gate: test-approval
        stop_conditions: [production_change_required]
      -
        id: release
        type: skill
        skill: release-readiness-check
        optional: false
        condition: candidate_available
        prerequisites: [test-implementation]
        next: []
        alternatives: []
        permission: read_only
        approval_gate: none
        stop_conditions: [release_blocker_found]
    forbidden_transitions: [clarification->implementation, specification->implementation, plan->implementation]
    stop_conditions: [material_decision_unresolved, write_not_authorized, release_blocker_found]
  bug-repair:
    title:
      en: Bug repair
      zh-CN: Bug 修复
    entry_conditions: [reproducible_or_observable_bug]
