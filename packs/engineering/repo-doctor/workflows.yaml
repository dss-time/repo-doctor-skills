        skill: safe-test-implementation
        optional: false
        condition: regression_after_fix
        prerequisites: [test-approval]
        next: [release]
        alternatives: []
        permission: write_scoped
        approval_gate: test-approval
        stop_conditions: [sensitivity_evidence_unavailable]
      -
        id: release
