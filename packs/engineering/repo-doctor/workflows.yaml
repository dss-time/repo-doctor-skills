        prerequisites: [fix]
        next: [test-gap]
        alternatives: []
        permission: read_only
        approval_gate: none
        stop_conditions: [intent_mismatch]
      -
        id: test-gap
        type: skill
        skill: test-gap-analysis
        optional: false
        condition: fix_reviewed
        prerequisites: [review]
        next: [test-approval]
        alternatives: []
        permission: read_only
        approval_gate: none
        stop_conditions: [regression_boundary_unknown]
      -
        id: test-approval
        type: gate
        skill: none
        optional: false
        condition: regression_test_required
        prerequisites: [test-gap]
        next: [regression-test]
        alternatives: []
